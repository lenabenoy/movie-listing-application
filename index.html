<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexFlix - Movie Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

    <nav class="bg-gray-800 p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wider text-red-500">FLEXFLIX</h1>
            <form id="search-form" class="w-full sm:w-96 flex">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search movies (e.g., Batman, Marvel)..." 
                    class="w-full px-4 py-2 rounded-l bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-red-500"
                    required
                >
                <button type="submit" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-r font-semibold transition">
                    Search
                </button>
            </form>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h2 id="section-title" class="text-xl font-semibold mb-6 text-gray-400">Popular Movies</h2>
        
        <div id="loader" class="hidden flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-500"></div>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
